<app-navbar-one/>

<div class="flex items-center gap-4 flex-wrap bg-overlay p-14 sm:p-16 before:bg-title before:bg-opacity-70" style="background-image:url('assets/img/shortcode/breadcumb.jpg');">
    <div class="text-center w-full">
        <h2 class="text-white text-8 md:text-[40px] font-normal leading-none text-center">Contact Us</h2>
        <ul class="flex items-center justify-center gap-[10px] text-base md:text-lg leading-none font-normal text-white mt-3 md:mt-4">
            <li><a [routerLink]="'/'">Home</a></li>
            <li>/</li>
            <li class="text-primary">Contact</li>
        </ul>
    </div>
</div>

<div class="s-pb-100 s-pt-100">
    <div class="container-fluid">
        <div class="max-w-[1720px] mx-auto flex justify-between gap-8">
            <div class="max-w-[894px] w-full hidden lg:block" data-aos="zoom-in">
                <img class="w-full" [src]="'assets/img/custom/contact.png'" alt="contct">
            </div>
            <div class="max-w-[725px] w-full mx-auto lg:mx-0">
                <div class="loader-wrapper" *ngIf="isLoading">
                    <span class="loader"></span>
                </div>
                <div data-aos="fade-up" *ngIf="apiData">
                    <img [src]="'assets/img/svg/about.svg'" class="size-16 " alt="">
                    <h3 class="leading-none font-medium mt-3 md:mt-6 text-2xl">{{apiData?.companyname}}</h3>
                    <p class="max-w-[474px] mt-3 md:mt-4 font-medium" [innerHtml]="apiData?.address"></p>
                    <br>
                    <h3 class="leading-none font-medium mt-3 md:mt-6 text-2xl">Contact</h3>
                    <p class="max-w-[474px] mt-3 md:mt-4 font-medium">
                        {{apiData?.contactnumber}}
                    </p>
                    <br>
                    <h3 class="leading-none font-medium mt-3 md:mt-6 text-2xl">Email Address</h3>
                    <p class="max-w-[474px] mt-3 md:mt-4 font-medium">
                        <a [href]="'mailto:' + apiData?.emailid">
                            {{apiData?.emailid}}
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<app-footer-one/>
