<app-navbar-one/>

<div class="flex items-center gap-4 flex-wrap bg-overlay p-14 sm:p-16 before:bg-title before:bg-opacity-70" style="background-image:url('assets/img/shortcode/breadcumb.jpg');">
    <div class="text-center w-full">
        <h2 class="text-white text-8 md:text-[40px] font-normal leading-none text-center">Icons</h2>
        <ul class="flex items-center justify-center gap-[10px] text-base md:text-lg leading-none font-normal text-white mt-3 md:mt-4">
            <li><a [routerLink]="'/'">Home</a></li>
            <li>/</li>
            <li class="text-primary">Icons</li>
        </ul>
    </div>
</div>

<div class="s-py-100">
    <div class="container-fluid">
        <div class="loader-wrapper" *ngIf="isLoading">
            <span class="loader"></span>
        </div>
        <app-layout-one [isIcons]="true" [productList]="iconsList" [classList]="'max-w-[1500px] mx-auto grid grid-cols-4 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-6 xl:grid-cols-8 gap-5 sm:gap-8 pt-8 md:pt-[50px]'"/>

        <app-pagination *ngIf="noOfPages > 1" [currentPage]="page" [totalPages]="noOfPages" (pageChange)="pageChange($event)" />
    </div>
</div>

<app-footer-one/>
