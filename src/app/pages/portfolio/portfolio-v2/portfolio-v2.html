<app-navbar-one/>

<div class="flex items-center gap-4 flex-wrap bg-overlay p-14 sm:p-16 before:bg-title before:bg-opacity-70" style="background-image:url('assets/img/shortcode/breadcumb.jpg');">
    <div class="text-center w-full">
        <h2 class="text-white text-8 md:text-[40px] font-normal leading-none text-center">Portfolio</h2>
        <ul class="flex items-center justify-center gap-[10px] text-base md:text-lg leading-none font-normal text-white mt-3 md:mt-4">
            <li><a [routerLink]="'/'">Home</a></li>
            <li>/</li>
            <li class="text-primary">Portfolio</li>
        </ul>
    </div>
</div>

<div class="s-py-100 overflow-hidden relative">
    <div class="container-fluid">
        <div class="max-w-[1720px] mx-auto" data-aos="fade-up" data-aos-delay="100">
            <div class="portfolio1-button flex justify-center gap-[15px] flex-wrap mb-8 md:mb-12">
                <button class="btn btn-sm btn-theme-outline" [ngClass]="activeFilter === '*' ? 'active' : ''" data-filter="*" (click)="tabChange('*')" data-text="All">
                    <span>All</span>
                </button>
                <button class="btn btn-sm btn-theme-outline" [ngClass]="activeFilter === 'Sofa' ? 'active' : ''" (click)="tabChange('Sofa')" data-text="Sofa & Chair">
                    <span>Sofa & Chair</span>
                </button>
                <button class="btn btn-sm btn-theme-outline" [ngClass]="activeFilter === 'Interior' ? 'active' : ''" (click)="tabChange('Interior')" data-text="Full Interior">
                    <span>Full Interior</span>
                </button>
                <button class="btn btn-sm btn-theme-outline" [ngClass]="activeFilter === 'Vase' ? 'active' : ''" (click)="tabChange('Vase')" data-text="Lamp & Vase">
                    <span>Lamp & Vase</span>
                </button>
                <button class="btn btn-sm btn-theme-outline" [ngClass]="activeFilter === 'Table' ? 'active' : ''" (click)="tabChange('Table')" data-text="Table">
                    <span>Table</span>
                </button>
                <button class="btn btn-sm btn-theme-outline" [ngClass]="activeFilter === 'Design' ? 'active' : ''" (click)="tabChange('Design')" data-text="Art Design">
                    <span>Art Design</span>
                </button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 lg:gap-6 md:gap-4 gap-2 -m-[10px] md:-m-[15px] mt-5">
                <div *ngFor="let item of filterItem" class="portfolio1-item Sofa">
                    <a [routerLink]="['/portfolio-details-v2',item.id]" class="portfolio-card relative before:absolute before:top-0 before:left-0 before:w-full before:h-full before:opacity-0 before:duration-300 hover:before:opacity-100 group overflow-hidden block">
                        <img class="w-full object-cover" [src]="item.image" alt="Portfolio">
                        <span class="absolute left-7 bottom-7 z-10 transform translate-y-8 duration-300 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 block">
                            <span class="inline-block text-[15px] leading-none text-title font-medium p-[10px] bg-[#DBCBBD] rounded-md">
                             {{item.tag}}
                            </span>
                            <span class="block text-lg md:text-xl font-semibold leading-none text-white mt-3 md:mt-4">
                                {{item.name}}
                            </span>
                        </span>
                        <span class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10 scale-50 duration-300 opacity-0 group-hover:opacity-100 group-hover:scale-100 block">
                            <i class="mdi mdi-arrow-expand-all text-white text-[40px]"></i>
                        </span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<app-footer-one/>
