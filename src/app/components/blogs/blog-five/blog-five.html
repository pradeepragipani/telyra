<owl-carousel-o [options]="customOptions" class="home-v5-blog-slider owl-carousel sm:max-w-[500px] lg:max-w-[750px] mx-auto  sm:mb-8 block lg:mt-[120px] mt-[80px]">
    <ng-container *ngFor="let item of blogData">
        <ng-template carouselSlide>
            <div class="relative group mx-[15px] sm:mx-0">
                <a [routerLink]="'/blog-details-v1'" class="overflow-hidden block">
                    <img class="duration-300 transform scale-100 group-hover:scale-110 w-full" [src]="item.image" alt="blog-card">
                </a>
                <div class="absolute top-0 w-full h-full flex items-center justify-center">
                    <div class="bg-white bg-opacity-90 dark:bg-title dark:bg-opacity-90 p-5 md:p-6  z-10 w-11/12 max-w-md ">
                        <ul class="flex items-center gap-[10px] flex-wrap">
                            <li class="text-[15px] leading-none dark:text-white">{{item.date}}</li>
                            <li><a [routerLink]="'/blog-tag'" class="inline-block text-title font-medium text-[15px] leading-none py-[10px] px-5 rounded-md bg-primary-midum">{{item.tag}}</a></li>
                        </ul>
                        <h5 class="mt-3 font-medium dark:text-white leading-[1.5]"><a [href]="'/blog-details-v1'" class="text-underline">{{item.title}}</a></h5>
                    </div>
                </div>
            </div>
        </ng-template>
    </ng-container>
</owl-carousel-o>
