<div class="container-fluid">
    <div class="max-w-[1720px] mx-auto">
        <div class="max-w-xl mx-auto mb-8 md:mb-12 text-center">
            <div>
                <img [src]="'assets/img/svg/chair.svg'" class='mx-auto w-14 sm:w-24' alt="">
            </div>
            <h3 class="leading-none mt-4 md:mt-6 text-2xl md:text-3xl text-title dark:text-white">
                Related Projects
            </h3>
            <p class="mt-3 text-base sm:text-lg text-paragraph dark:text-white">
                Explore similar projects crafted with precision and creativity. Discover how we bring unique ideas to life!
            </p>
        </div>
        <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-5 md:gap-[30px]">
            <ng-container *ngFor="let item of portfolioData.slice(0,3)">
                <a [routerLink]="['/portfolio-details-v1',item.id]" class="portfolio-card relative before:absolute before:top-0 before:left-0 before:w-full before:h-full before:opacity-100 before:duration-300 group overflow-hidden block">
                    <img class="w-full object-cover" [src]="item.image" alt="Portfolio">
                    <div class="absolute left-7 bottom-7 z-10 duration-300">
                        <span class="inline-block text-[15px] leading-none text-title font-medium p-[10px] bg-[#DBCBBD] rounded-md">{{item.tag}}</span>
                        <span class="block text-lg md:text-xl font-semibold leading-none text-white mt-3 md:mt-4">
                            {{item.name}}
                        </span>
                    </div>
                    <span class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 z-10 scale-50 duration-300 opacity-0 group-hover:opacity-100 group-hover:scale-100 block">
                        <span class="mdi mdi-arrow-expand-all text-white text-[40px]"></span>
                    </span>
                </a>
            </ng-container>
        </div>
    </div>
</div>
