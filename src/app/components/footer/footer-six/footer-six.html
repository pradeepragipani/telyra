 <div class="s-pt-100 2xl:pb-[100px]">
    <div class="container max-w-auto mx-auto">
        <div class="flex flex-col 2xl:flex-row items-start justify-between gap-10">
            <div class="max-w-[500px] 2xl:max-w-[500px] w-full text-left sm:text-center 2xl:text-left sm:mx-auto 2xl:mx-0">
                <h4 class="leading-none mb-5 md:mb-6 text-xl">{{apiData.companyname}}</h4>
                <p class="mt-[15px]" [innerHTML]="apiData.address"></p>
                <p class="mt-[15px]">Mobile: {{apiData.contactnumber}}</p>
                <p class="mt-[15px]">Email: {{apiData.emailid}}</p>
                <p class="mt-[15px]">© {{year}} Telyra.</p>
            </div>
            <div class="grid grid-cols-1">
                <div>
                    <h4 class="leading-none mb-5 md:mb-6 text-xl">Customer Service</h4>
                    <ul class="text-title dark:text-white leading-none flex flex-col gap-4">
                        <li *ngFor="let item of footerLink" class="duration-100 hover:text-primary inline-block group">
                            <a class="text-underline-primary" [routerLink]="item.link" [queryParams]="{ load: item.param }"
                                (click)="scrollToTop()">{{item.name}}</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="block 2xl:hidden py-5 text-center mt-14">
            <p>© {{year}} Telyra. All rights reserved.</p>
        </div>
    </div>
</div>
